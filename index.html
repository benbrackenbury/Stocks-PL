<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPCX · Profit & Loss</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0f14;
      color: #e8edf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #141b24;
      border: 1px solid #243041;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a8da6;
      margin-bottom: 0.35rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #7a8da6;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .pl {
      font-size: 2.75rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }

    .pl.positive { color: #3dd68c; }
    .pl.negative { color: #f87171; }

    .pct {
      font-size: 1.1rem;
      color: #7a8da6;
      margin-bottom: 2rem;
    }

    .pct.positive { color: #3dd68c; }
    .pct.negative { color: #f87171; }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.75rem 0;
      border-top: 1px solid #243041;
    }

    .row:first-child { border-top: none; padding-top: 0; }

    .value { font-weight: 600; }

    .updated {
      margin-top: 1.75rem;
      font-size: 0.8rem;
      color: #556579;
      text-align: center;
    }

    .error {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="label">Investment tracker</p>
    <h1>SPCX</h1>
    <p class="subtitle">SpaceX · 6.5 shares · £700 cost</p>

    <div id="pl" class="pl">—</div>
    <div id="pct" class="pct">—</div>

    <div class="grid">
      <div class="row">
        <span class="label">Current value</span>
        <span id="value" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Cost basis</span>
        <span class="value">£700.00</span>
      </div>
      <div class="row">
        <span class="label">Share price</span>
        <span id="price" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">USD → GBP</span>
        <span id="fx" class="value">—</span>
      </div>
    </div>

    <p id="updated" class="updated"></p>
    <p id="error" class="error"></p>
  </main>

  <script>
    const SHARES = 6.5;
    const COST_GBP = 700;

    const fmt = (n) => new Intl.NumberFormat("en-GB", {
      style: "currency",
      currency: "GBP",
      minimumFractionDigits: 2,
    }).format(n);

    const fmtUsd = (n) => new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
    }).format(n);

    function render(data) {
      const priceUsd = data.priceUsd;
      const usdToGbp = data.usdToGbp;
      const valueGbp = SHARES * priceUsd * usdToGbp;
      const pl = valueGbp - COST_GBP;
      const pct = (pl / COST_GBP) * 100;
      const positive = pl >= 0;

      document.getElementById("pl").textContent = (positive ? "+" : "") + fmt(pl);
      document.getElementById("pl").className = "pl " + (positive ? "positive" : "negative");
      document.getElementById("pct").textContent = (positive ? "+" : "") + pct.toFixed(2) + "%";
      document.getElementById("pct").className = "pct " + (positive ? "positive" : "negative");
      document.getElementById("value").textContent = fmt(valueGbp);
      document.getElementById("price").textContent = fmtUsd(priceUsd);
      document.getElementById("fx").textContent = usdToGbp.toFixed(4);
      document.getElementById("updated").textContent =
        "Updated " + new Date(data.updated).toLocaleString("en-GB");
    }

    fetch("data.json")
      .then((r) => {
        if (!r.ok) throw new Error("Could not load price data");
        return r.json();
      })
      .then(render)
      .catch((err) => {
        document.getElementById("error").textContent = err.message;
      });
  </script>
</body>
</html>
