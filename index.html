<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPCX · Profit & Loss</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0f14;
      color: #e8edf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #141b24;
      border: 1px solid #243041;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a8da6;
      margin-bottom: 0.35rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #7a8da6;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .pl {
      font-size: 2.75rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }

    .pl.positive { color: #3dd68c; }
    .pl.negative { color: #f87171; }

    .pct {
      font-size: 1.1rem;
      color: #7a8da6;
      margin-bottom: 2rem;
    }

    .pct.positive { color: #3dd68c; }
    .pct.negative { color: #f87171; }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.75rem 0;
      border-top: 1px solid #243041;
    }

    .row:first-child { border-top: none; padding-top: 0; }

    .value { font-weight: 600; }

    .updated {
      margin-top: 1.75rem;
      font-size: 0.8rem;
      color: #556579;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3dd68c;
      flex-shrink: 0;
    }

    .live-dot.cached { background: #7a8da6; }
    .live-dot.loading {
      background: #fbbf24;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .error {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="label">Investment tracker</p>
    <h1>SPCX</h1>
    <p class="subtitle">SpaceX · 10.35758955 shares · £1,200 cost</p>

    <div id="pl" class="pl">—</div>
    <div id="pct" class="pct">—</div>

    <div class="grid">
      <div class="row">
        <span class="label">Current value</span>
        <span id="value" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">Cost basis</span>
        <span class="value">£1,200.00</span>
      </div>
      <div class="row">
        <span class="label">Share price</span>
        <span id="price" class="value">—</span>
      </div>
      <div class="row">
        <span class="label">USD → GBP</span>
        <span id="fx" class="value">—</span>
      </div>
    </div>

    <p id="updated" class="updated">
      <span id="live-dot" class="live-dot loading"></span>
      <span id="updated-text">Loading…</span>
    </p>
    <p id="error" class="error"></p>
  </main>

  <script>
    const SHARES = 10.35758955;
    const COST_GBP = 1200;
    const REFRESH_MS = 5 * 60 * 1000;

    const YAHOO_URL =
      "https://query2.finance.yahoo.com/v8/finance/chart/SPCX?interval=1d&range=1d";
    const FX_URL = "https://api.exchangerate-api.com/v4/latest/USD";

    let lastUpdated = null;
    let isLive = false;

    const fmt = (n) => new Intl.NumberFormat("en-GB", {
      style: "currency",
      currency: "GBP",
      minimumFractionDigits: 2,
    }).format(n);

    const fmtUsd = (n) => new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
    }).format(n);

    function relativeTime(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 10) return "just now";
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes} min ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      return date.toLocaleString("en-GB");
    }

    function updateTimestamp() {
      const text = document.getElementById("updated-text");
      const dot = document.getElementById("live-dot");
      if (!lastUpdated) return;

      const prefix = isLive ? "Live · updated " : "Cached · updated ";
      text.textContent = prefix + relativeTime(lastUpdated);
      dot.className = "live-dot" + (isLive ? "" : " cached");
    }

    function render(data, live) {
      const priceUsd = data.priceUsd;
      const usdToGbp = data.usdToGbp;
      const valueGbp = SHARES * priceUsd * usdToGbp;
      const pl = valueGbp - COST_GBP;
      const pct = (pl / COST_GBP) * 100;
      const positive = pl >= 0;

      document.getElementById("pl").textContent = (positive ? "+" : "") + fmt(pl);
      document.getElementById("pl").className = "pl " + (positive ? "positive" : "negative");
      document.getElementById("pct").textContent = (positive ? "+" : "") + pct.toFixed(2) + "%";
      document.getElementById("pct").className = "pct " + (positive ? "positive" : "negative");
      document.getElementById("value").textContent = fmt(valueGbp);
      document.getElementById("price").textContent = fmtUsd(priceUsd);
      document.getElementById("fx").textContent = usdToGbp.toFixed(4);

      lastUpdated = new Date(data.updated);
      isLive = live;
      updateTimestamp();
      document.getElementById("error").textContent = "";
    }

    async function fetchYahooPrice() {
      const proxyUrl =
        "https://api.allorigins.win/get?url=" + encodeURIComponent(YAHOO_URL);
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error("Price fetch failed");
      const wrapper = await res.json();
      const chart = JSON.parse(wrapper.contents);
      const price = chart?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (typeof price !== "number") throw new Error("Invalid price data");
      return price;
    }

    async function fetchFxRate() {
      const res = await fetch(FX_URL);
      if (!res.ok) throw new Error("FX fetch failed");
      const data = await res.json();
      const gbp = data?.rates?.GBP;
      if (typeof gbp !== "number") throw new Error("Invalid FX data");
      return gbp;
    }

    async function fetchCached() {
      const res = await fetch("data.json?t=" + Date.now());
      if (!res.ok) throw new Error("Could not load cached price data");
      return res.json();
    }

    async function refresh() {
      const dot = document.getElementById("live-dot");
      dot.className = "live-dot loading";

      try {
        const [priceUsd, usdToGbp] = await Promise.all([
          fetchYahooPrice(),
          fetchFxRate(),
        ]);
        render(
          { priceUsd, usdToGbp, updated: new Date().toISOString() },
          true
        );
      } catch (liveErr) {
        try {
          const cached = await fetchCached();
          render(cached, false);
          document.getElementById("error").textContent =
            "Live feed unavailable — showing cached data";
        } catch {
          document.getElementById("error").textContent = liveErr.message;
          dot.className = "live-dot cached";
        }
      }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
    setInterval(updateTimestamp, 30_000);
  </script>
</body>
</html>
